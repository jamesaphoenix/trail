name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Avoid intermittent "Error in the HTTP2 framing layer" when cargo fetches the
  # crates.io index on Windows runners.
  CARGO_HTTP_MULTIPLEXING: false

jobs:
  test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: build
        run: cargo build --workspace --locked --verbose
      - name: test
        run: cargo test --workspace --locked --verbose

  churn:
    name: churn feature (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cmake (vendored libgit2)
        run: sudo apt-get update && sudo apt-get install -y cmake
      - name: build + test (churn)
        run: cargo test -p trail-core --features churn --locked --verbose

  msrv:
    name: MSRV 1.85 (rust-version floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: build + test on the declared MSRV
        run: cargo test --workspace --locked --verbose
